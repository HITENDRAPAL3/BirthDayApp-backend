server:
  port: 8080

spring:
  application:
    name: birthday-reminder
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/birthdaydb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      idle-timeout: 10000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong2024}
    expiration: 86400000  # 24 hours in milliseconds
  
  scheduler:
    enabled: true
    cron: "0 * * * * ?"  # Run every minute to check per-user notification times
  
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://birthdayapp-frontend.onrender.com,http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.birthday.reminder: DEBUG
    org.springframework.security: INFO
